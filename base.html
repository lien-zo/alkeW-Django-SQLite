<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Alke Wallet{% endblock %}</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #f4efe7;
            --surface: #fffaf3;
            --surface-strong: #ffffff;
            --ink: #1f2933;
            --muted: #52606d;
            --accent: #0f766e;
            --accent-dark: #115e59;
            --danger: #b42318;
            --border: #d9cbb7;
            --shadow: 0 14px 30px rgba(31, 41, 51, 0.08);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Georgia, "Times New Roman", serif;
            background: radial-gradient(circle at top, #fdf8ee, #f3eadc 58%, #eadcc7 100%);
            color: var(--ink);
        }

        a {
            color: var(--accent-dark);
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        .wrapper {
            width: min(1120px, calc(100% - 2rem));
            margin: 0 auto;
            padding: 2rem 0 3rem;
        }

        .topbar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .brand h1 {
            margin: 0;
            font-size: clamp(2rem, 5vw, 3rem);
        }

        .brand p {
            margin: 0.25rem 0 0;
            color: var(--muted);
        }

        .nav {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
        }

        .nav a,
        .button,
        button {
            border: 1px solid var(--border);
            background: var(--surface-strong);
            color: var(--ink);
            padding: 0.75rem 1rem;
            border-radius: 999px;
            font: inherit;
            cursor: pointer;
            box-shadow: var(--shadow);
        }

        .nav a.active,
        .button-primary,
        button {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }

        .grid {
            display: grid;
            gap: 1.25rem;
        }

        .stats {
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        }

        .card {
            background: rgba(255, 250, 243, 0.92);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 1.5rem;
            box-shadow: var(--shadow);
        }

        .card h2,
        .card h3 {
            margin-top: 0;
        }

        .kpi {
            font-size: 2rem;
            margin: 0.35rem 0 0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            padding: 0.9rem 0.75rem;
            border-bottom: 1px solid var(--border);
            text-align: left;
        }

        th {
            color: var(--muted);
            font-weight: 600;
        }

        form {
            display: grid;
            gap: 1rem;
        }

        form p {
            display: grid;
            gap: 0.35rem;
            margin: 0;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 0.8rem 0.9rem;
            border-radius: 14px;
            border: 1px solid var(--border);
            background: #fff;
            font: inherit;
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            margin-top: 1rem;
        }

        .danger {
            background: var(--danger);
            color: #fff;
            border-color: var(--danger);
        }

        .empty {
            color: var(--muted);
            font-style: italic;
        }

        .split {
            grid-template-columns: 2fr 1fr;
        }

        .list {
            margin: 0;
            padding-left: 1.2rem;
        }

        @media (max-width: 760px) {
            .split {
                grid-template-columns: 1fr;
            }

            table,
            thead,
            tbody,
            th,
            td,
            tr {
                display: block;
            }

            thead {
                display: none;
            }

            td {
                padding-left: 0;
                padding-right: 0;
            }
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <header class="topbar">
            <div class="brand">
                <h1>Alke Wallet</h1>
                <p>Gestion de clientes y operaciones con Django ORM y SQLite.</p>
            </div>
            <nav class="nav">
                <a href="{% url 'wallet:dashboard' %}">Inicio</a>
                <a href="{% url 'wallet:customer_list' %}">Clientes</a>
                <a href="{% url 'wallet:transaction_list' %}">Transacciones</a>
                <a href="/admin/">Admin</a>
            </nav>
        </header>
        {% block content %}{% endblock %}
    </div>
</body>
</html>
